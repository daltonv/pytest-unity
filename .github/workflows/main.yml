name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.14'

    - name: Run tests with pytest
      run: uv run pytest test/

    - name: Install Reviewdog
      uses: reviewdog/action-setup@v1

    - name: Lint with ruff and mypy
      if: ${{ always() }}
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        reviewdog \
            -runners=ruff,mypy \
            -reporter=github-pr-check \
            -filter-mode=added \
            -fail-level=error

    - name: Ruff format review
      if: ${{ always() }}
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        uv run --group lint ruff format --check --diff \
        . |
        reviewdog \
            -f=diff \
            -f.diff.strip=0 \
            -name=ruff-format \
            -reporter=github-pr-check \
            -filter-mode=added \
            -fail-level=error
