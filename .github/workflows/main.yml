name: CI

on:
  push:
    branches:
      - main
    tags:
      - '*'

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        python-version: '3.14'

    - name: Run tests with pytest
      run: uv run pytest test/
